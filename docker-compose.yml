services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wap}
      POSTGRES_DB: ${POSTGRES_DB:-wap}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Services reach Postgres over the internal network at db:5432.
    # Publish a host port only if you need external access, e.g.:
    #   ports:
    #     - "${DB_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wap}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-wap}:${POSTGRES_PASSWORD:-wap}@db:5432/${POSTGRES_DB:-wap}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SIGNUP_GRANT_CENTS: ${SIGNUP_GRANT_CENTS:-50000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
